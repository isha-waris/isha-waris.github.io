<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
    <defs>
        <style>
      .favicon-bg { fill: #0f172a; }
      .favicon-gradient { font-family: Arial, sans-serif; font-weight: bold; font-size: 110px; }
        </style>
        <linearGradient id="faviconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect class="favicon-bg" width="192" height="192"/>

    <!-- Outer circle border gradient -->
    <circle cx="96" cy="96" r="88" stroke="url(#faviconGrad)" stroke-width="4" fill="none" opacity="0.8"/>

    <!-- Inner circle with gradient -->
    <circle cx="96" cy="96" r="80" fill="url(#faviconGrad)" opacity="0.15"/>

    <!-- Text: IW -->
    <text x="96" y="125" text-anchor="middle" class="favicon-gradient" fill="url(#faviconGrad)">IW</text>

    <!-- Decorative dots -->
    <circle cx="140" cy="50" r="4" fill="#06b6d4" opacity="0.8"/>
    <circle cx="52" cy="142" r="4" fill="#ec4899" opacity="0.8"/>
    <circle cx="158" cy="158" r="3" fill="#a855f7" opacity="0.6"/>
</svg>
